<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vianne Jewels">
<meta name="theme-color" content="#1B5C4B">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" href="assets/favicon.png">
<title>Vianne Jewels — JCK 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
body {
  font-family: 'DM Sans', sans-serif;
  background-color: #0D1F1A;
  color: #F5EDD9;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 16px;
}
.lock-box {
  background: #134438;
  padding: 40px;
  border-radius: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  border: 1px solid #C9A87C;
  text-align: center;
  max-width: 380px;
  width: 100%;
}
h2 {
  color: #E2C98A;
  margin: 0 0 10px;
  letter-spacing: 0.1em;
  font-size: 1.3rem;
}
p {
  font-size: 0.85rem;
  color: #6B8C82;
  margin: 0 0 24px;
  line-height: 1.6;
}
input {
  width: 100%;
  padding: 13px;
  border-radius: 8px;
  border: 1.5px solid #D6E8E2;
  background: #F5EDD9;
  color: #0D1F1A;
  font-size: 1rem;
  outline: none;
  text-align: center;
  margin-bottom: 14px;
  box-sizing: border-box;
  font-family: inherit;
}
input:focus {
  border-color: #C9A87C;
}
button {
  width: 100%;
  padding: 13px;
  background: #C9A87C;
  color: #0D1F1A;
  border: none;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  letter-spacing: 0.05em;
  font-family: inherit;
}
button:hover { background: #E2C98A; }
button:active { background: #b8924e; }
.err-msg {
  color: #F5B7B1;
  font-size: 0.8rem;
  margin-top: 12px;
  display: none;
}
.logo {
  margin-bottom: 18px;
}
</style>
</head>
<body>

<div class="lock-box">
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M30 8 C30 8 22 16 22 24 C22 28 25 31 30 31 C35 31 38 28 38 24 C38 16 30 8 30 8Z" stroke="#C9A87C" stroke-width="1.5" fill="none"/>
      <path d="M20 14 C20 14 13 20 14 28 C15 32 18 34 22 33" stroke="#C9A87C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M40 14 C40 14 47 20 46 28 C45 32 42 34 38 33" stroke="#C9A87C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="30" cy="38" r="1.5" fill="#C9A87C"/>
      <circle cx="30" cy="43" r="1.5" fill="#C9A87C"/>
    </svg>
  </div>
  <h2>VIANNE JEWELS</h2>
  <p>JCK 2026 — Private price lookup.<br>Enter your name and access password.</p>
  <input type="text" id="nameInput" placeholder="Your Name" autocomplete="name"
    onkeydown="if(event.key==='Enter') checkLogin()">
  <input type="password" id="passInput" placeholder="Password" autocomplete="current-password"
    onkeydown="if(event.key==='Enter') checkLogin()">
  <button type="button" onclick="checkLogin()">Enter</button>
  <div id="err" class="err-msg">Enter valid name and password.</div>
</div>

<script>
const SECURE_KEY = "VianneNY";
const AUTH_KEY   = "vianne_jck_auth";
const USER_KEY   = "vianne_user_name";

if (localStorage.getItem(AUTH_KEY) === "1" && localStorage.getItem(USER_KEY)) {
  window.location.replace("lookup.html");
}

function checkLogin() {
  const name = document.getElementById("nameInput").value.trim();
  const p = document.getElementById("passInput").value;
  if (name && p === SECURE_KEY) {
    localStorage.setItem(AUTH_KEY, "1");
    localStorage.setItem(USER_KEY, name);
    window.location.href = "lookup.html";
  } else {
    document.getElementById("err").style.display = "block";
    document.getElementById("passInput").value = "";
    if (!name) document.getElementById("nameInput").focus();
    else document.getElementById("passInput").focus();
  }
}
</script>
</body>
</html>
