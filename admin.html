<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1B5C4B">
<link rel="icon" type="image/png" href="assets/favicon.png">
<title>Vianne — Approve Access</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
body{font-family:'DM Sans',sans-serif;background:#EEF5F2;margin:0;padding:20px;color:#0D1F1A}
.wrap{max-width:560px;margin:0 auto}
h1{font-size:1.2rem;color:#1B5C4B;margin:0 0 6px}
.sub{font-size:.8rem;color:#6B8C82;margin-bottom:20px}
.card{background:#fff;border:1px solid #D6E8E2;border-radius:12px;padding:20px;margin-bottom:16px}
input{width:100%;padding:11px;border:1.5px solid #D6E8E2;border-radius:8px;font-size:1rem;margin-bottom:12px}
button{padding:10px 16px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-go{background:#1B5C4B;color:#E2C98A;width:100%}
.btn-refresh{background:#C9A87C;color:#0D1F1A;margin-bottom:16px}
.req-card{border:1px solid #D6E8E2;border-radius:10px;padding:14px;margin-bottom:12px;background:#FDFAF4}
.req-card.status-pending{border-color:#C9A87C;background:#FFFBF3}
.req-codes{font-family:ui-monospace,Menlo,monospace;font-size:.95rem;line-height:1.7;color:#134438;margin:8px 0}
.req-meta{font-size:.72rem;color:#6B8C82}
.badge{text-transform:uppercase;font-weight:700}
.req-actions{display:flex;gap:8px;margin-top:10px}
.btn-approve{flex:1;background:#1B5C4B;color:#E2C98A}
.btn-deny{flex:1;background:#fff;border:1.5px solid #B03020;color:#B03020}
h3{font-size:.85rem;color:#1B5C4B;margin:18px 0 8px}
.muted{color:#6B8C82;font-size:.85rem}
.setup{background:#FDEDEC;border:1px solid #F5B7B1;padding:16px;border-radius:8px;font-size:.85rem}
</style>
</head>
<body>
<div class="wrap">
  <h1>Approve access requests</h1>
  <p class="sub">Only you should bookmark this page.</p>

  <div id="setupNotice" class="setup" style="display:none">
    Configure <code>firebase-config.js</code> first — see <a href="FIREBASE-SETUP.md">FIREBASE-SETUP.md</a>.
  </div>

  <div id="adminLogin" class="card">
    <label>Admin password</label>
    <input type="password" id="adminPass" placeholder="Admin password" autocomplete="current-password">
    <button type="button" class="btn-go" id="adminLoginBtn">Sign in</button>
  </div>

  <div id="adminPanel" style="display:none">
    <button type="button" class="btn-refresh" id="refreshBtn">Refresh list</button>
    <div id="requestList"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/auth-common.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
