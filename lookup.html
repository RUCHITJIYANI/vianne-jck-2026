<title>JCK 2026 — Jewel Lookup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root{--gold:#C9A87C;--gold-light:#E2C98A;--gold-dark:#A07840;--ink:#0D1F1A;--teal:#1B5C4B;--teal-dark:#134438;--teal-light:#2A7A63;--cream:#F5EDD9;--warm:#FDFAF4;--mid:#6B8C82;--border:#D6E8E2;--shadow:rgba(13,31,26,.1);--red:#B03020;--green:#1B5C4B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#EEF5F2;color:var(--ink);min-height:100vh}
header{background:var(--teal);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4)}
header h1{font-family:'DM Sans',sans-serif;color:var(--gold-light);font-size:1.1rem;letter-spacing:.2em;font-weight:700}
header .sub{font-size:.66rem;color:rgba(197,212,207,.7);letter-spacing:.15em;text-transform:uppercase}.tagline{font-size:.58rem;color:rgba(197,212,207,.6);letter-spacing:.18em;text-transform:uppercase;margin-top:1px}
.app{max-width:1160px;margin:0 auto;padding:26px 16px 60px;display:grid;grid-template-columns:330px 1fr;gap:26px;align-items:start;width:100%}
.panel{background:var(--warm);border:1px solid var(--border);border-radius:14px;padding:22px;box-shadow:0 2px 16px var(--shadow);width:100%;min-width:0}
.panel-title{font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--teal);margin-bottom:18px;display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.fg{margin-bottom:15px}
label{display:block;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);margin-bottom:5px}
input[type=text],input[type=number]{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:16px;background:var(--cream);color:var(--ink);transition:border-color .2s,box-shadow .2s;outline:none;-webkit-appearance:none;appearance:none}
input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(27,92,75,.12)}
input.found{border-color:var(--teal)}
.hint{font-size:.68rem;color:var(--mid);margin-top:4px}
.btn-scan{width:100%;padding:11px;background:var(--teal);color:var(--gold-light);border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s;margin-bottom:15px}
.btn-scan:hover{background:var(--teal-dark)}
#sw{display:none;position:relative;border-radius:10px;overflow:hidden;background:#000;aspect-ratio:4/3;margin-bottom:12px}
#sw.on{display:block}
#interactive{width:100%;height:100%}
#interactive video{width:100%;height:100%;object-fit:cover}
.scan-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-box{width:65%;aspect-ratio:1/1;border:2px solid var(--gold);border-radius:8px;box-shadow:0 0 0 2000px rgba(0,0,0,.5);position:relative}
.scan-line{position:absolute;left:2px;right:2px;height:3px;background:var(--gold);animation:sl 1.2s ease-in-out infinite;box-shadow:0 0 8px rgba(201,168,124,.8)}
@keyframes sl{0%,100%{top:4px}50%{top:calc(100% - 6px)}}
.btn-stop{width:100%;padding:8px;border-radius:8px;background:transparent;border:1.5px solid var(--border);color:var(--mid);font-size:.76rem;cursor:pointer;margin-bottom:12px;font-family:'DM Sans',sans-serif;transition:border-color .2s}
.btn-stop:hover{border-color:var(--red);color:var(--red)}
.status{font-size:.76rem;padding:8px 11px;border-radius:8px;margin-top:11px;display:none}
.status.show{display:block}
.status.ok{background:#E4F4EE;color:var(--teal);border:1px solid #9ECFC0}
.status.err{background:#FDEDEC;color:var(--red);border:1px solid #F5B7B1}
.acw{position:relative}
.acl{position:absolute;top:100%;left:0;right:0;background:var(--warm);border:1.5px solid var(--teal);border-top:none;border-radius:0 0 9px 9px;max-height:200px;overflow-y:auto;z-index:200;box-shadow:0 8px 20px var(--shadow)}
.acl li{padding:9px 14px;cursor:pointer;font-size:.84rem;list-style:none;border-bottom:1px solid var(--border)}
.acl li:last-child{border-bottom:none}
.acl li:hover,.acl li.hi{background:#EEF6F3}
.acl li small{display:block;color:var(--mid);font-size:.67rem}
.rc{background:var(--warm);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 4px 20px var(--shadow);display:none;animation:fu .28s ease;width:100%;min-width:0}
.rc.show{display:block}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ch{background:var(--teal);padding:18px 24px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ch h2{font-family:'DM Sans',sans-serif;color:var(--gold-light);font-size:1.3rem;font-weight:700;letter-spacing:.02em}
.ch .sc{font-size:.68rem;letter-spacing:.12em;color:var(--mid);text-transform:uppercase;margin-top:3px}
.badge{display:inline-block;background:rgba(201,168,124,.18);border:1px solid rgba(201,168,124,.5);color:var(--gold-light);font-size:.66rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:20px;white-space:nowrap}
/* REAL IMAGE */
.ci{background:#EAF2EF;display:flex;align-items:center;justify-content:center;padding:0;border-bottom:1px solid var(--border);min-height:200px;position:relative;overflow:hidden}
.ci img{width:100%;max-height:260px;object-fit:contain;display:block;transition:max-height .2s}
.ci .no-img{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;color:var(--mid);font-size:.8rem;gap:8px;width:100%}
/* price hero */
.cb{padding:20px 24px}
.ps{background:#F4FAF8;border:1px solid rgba(27,92,75,.18);border-radius:11px;padding:0 0 16px;margin-bottom:18px;overflow:hidden}
.ph{background:var(--teal);padding:16px 20px 13px;border-bottom:2px solid var(--gold)}
.ph-lbl{font-size:.64rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-light);margin-bottom:3px}
.ph-row{display:flex;align-items:baseline;gap:9px}
.ph-val{font-family:'DM Sans',sans-serif;font-size:2.6rem;font-weight:700;color:var(--gold-light);line-height:1;letter-spacing:-.01em}
.ph-src{font-size:.7rem;color:rgba(229,210,160,.7)}
.ph-form{font-size:.66rem;color:rgba(229,210,160,.55);margin-top:3px}
.pt{font-size:.65rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);margin:14px 0 10px;padding:0 20px;display:flex;align-items:center;gap:6px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;padding:0 20px}
.pk{font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-bottom:2px}
.pv{font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:600;color:var(--ink)}
.pf{font-size:.66rem;color:var(--mid);margin-top:1px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:11px 20px;margin-bottom:18px}
.dk{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-light);margin-bottom:2px}
.dv{font-size:.88rem;font-weight:500}
.st{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal)}
.stbl{width:100%;border-collapse:collapse;font-size:.8rem}
.stbl th{text-align:left;font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);padding:5px 8px;border-bottom:1px solid var(--border)}
.stbl td{padding:7px 8px;border-bottom:1px solid #F0EBE3}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--cream)}
.empty{background:var(--warm);border:1.5px dashed #B8D5CC;border-radius:14px;padding:48px 22px;text-align:center;color:var(--teal-light)}
.empty .ico{font-size:2.8rem;opacity:.3;margin-bottom:10px}

/* ── LARGE DESKTOP (1200px+) ── */
@media(min-width:1200px){
  .app{max-width:1300px;grid-template-columns:360px 1fr;gap:32px}
  .ph-val{font-size:3rem}
  .ci img{max-height:300px}
}

/* ── LAPTOP / DESKTOP (900–1199px) ── */
@media(min-width:900px) and (max-width:1199px){
  .app{grid-template-columns:310px 1fr;gap:24px;padding:22px 20px 50px}
}

/* ── TABLET LANDSCAPE / SMALL LAPTOP (740–899px) ── */
@media(min-width:740px) and (max-width:899px){
  .app{grid-template-columns:280px 1fr;gap:20px;padding:18px 16px 40px}
  .panel{padding:18px}
  .cb{padding:16px 18px}
  .ph-val{font-size:2.2rem}
}

/* ── TABLET PORTRAIT — iPad (600–739px) ── */
@media(max-width:739px){
  .app{grid-template-columns:1fr;padding:16px 14px 40px;gap:16px}
  header{padding:13px 18px}
  header h1{font-size:.95rem;letter-spacing:.15em}
  .tagline{display:none}
  .ch h2{font-size:1.15rem}
  .ph-val{font-size:2.2rem}
  .pg{grid-template-columns:1fr 1fr}
  .dg{grid-template-columns:1fr 1fr}
}

/* ── PHONE LARGE (480–599px) ── */
@media(max-width:599px){
  header{padding:11px 14px;gap:10px}
  header h1{font-size:.85rem;letter-spacing:.12em}
  header .sub{font-size:.58rem}
  .app{padding:12px 10px 36px;gap:14px}
  .panel{padding:16px 14px;border-radius:12px}
  .rc{border-radius:12px}
  .ch{padding:14px 16px}
  .ch h2{font-size:1.1rem}
  .badge{font-size:.6rem;padding:3px 8px}
  .ci{min-height:160px}
  .ci img{max-height:200px}
  .cb{padding:14px 16px}
  .ph{padding:14px 16px 11px}
  .ph-val{font-size:2rem}
  .pg{grid-template-columns:1fr 1fr;gap:9px 14px;padding:0 16px}
  .pt{padding:0 16px;font-size:.62rem}
  .dg{grid-template-columns:1fr 1fr;gap:10px 14px}
  .dk{font-size:.62rem}
  .dv{font-size:.84rem}
  .stbl{font-size:.76rem}
  .stbl th{font-size:.6rem;padding:5px 6px}
  .stbl td{padding:6px 6px}
  .acl li{font-size:.8rem;padding:8px 12px}
  .btn-scan{font-size:.76rem;padding:10px}
  input[type=text],input[type=number]{font-size:.85rem;padding:10px 12px}
}

/* ── PHONE SMALL (max 479px — iPhone SE, small Androids) ── */
@media(max-width:479px){
  header{padding:10px 12px}
  header h1{font-size:.78rem;letter-spacing:.1em}
  .app{padding:10px 8px 32px}
  .panel{padding:14px 12px}
  .ch{padding:12px 14px}
  .ch h2{font-size:1rem}
  .ph-val{font-size:1.8rem}
  .pg{grid-template-columns:1fr 1fr;padding:0 14px;gap:8px 12px}
  .pv{font-size:.95rem}
  .dg{grid-template-columns:1fr 1fr}
  .ci img{max-height:180px}
  .empty{padding:36px 16px}
  .stbl th,.stbl td{padding:5px 5px}
}

/* ── TOUCH DEVICES: bigger tap targets ── */
@media(hover:none) and (pointer:coarse){
  .btn-scan{min-height:48px}
  .btn-stop{min-height:42px}
  input[type=text],input[type=number]{min-height:46px}
  .acl li{min-height:44px;display:flex;flex-direction:column;justify-content:center}
}


/* ═══════════════════════════════════════════════
   iPHONE 17 PRO SPECIFIC (393×852pt, 3x, Dynamic Island)
   ═══════════════════════════════════════════════ */

/* Safe area for Dynamic Island + home indicator */
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);
}

/* Sticky header clears Dynamic Island */
header {
  padding-top: max(16px, env(safe-area-inset-top));
  padding-left: max(18px, env(safe-area-inset-left));
  padding-right: max(18px, env(safe-area-inset-right));
}

/* Bottom padding clears home indicator bar */
body {
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── iPhone 17 Pro portrait (393pt wide) ── */
@media only screen
  and (device-width: 393px)
  and (device-height: 852px)
  and (-webkit-device-pixel-ratio: 3) {
  
  .app {
    grid-template-columns: 1fr;
    padding: 14px 14px calc(32px + env(safe-area-inset-bottom)) 14px;
    gap: 14px;
  }

  header h1 { font-size: .88rem; letter-spacing: .14em; }
  header .sub { font-size: .6rem; }
  
  /* Slightly larger inputs for ProMotion touch accuracy */
  input[type=text], input[type=number] {
    font-size: 16px; /* prevents iOS zoom on focus */
    min-height: 50px;
    border-radius: 12px;
  }

  .btn-scan { min-height: 52px; border-radius: 12px; font-size: .82rem; }
  .btn-stop { min-height: 44px; border-radius: 10px; }

  /* Card image - taller on Pro's tall screen */
  .ci { min-height: 200px; }
  .ci img { max-height: 240px; }

  /* Price hero - comfortable reading */
  .ph { padding: 18px 18px 14px; }
  .ph-val { font-size: 2.4rem; }
  .ph-lbl { font-size: .7rem; letter-spacing: .2em; }

  /* Pricing grid - 2 cols fits perfectly at 393pt */
  .pg { grid-template-columns: 1fr 1fr; gap: 12px 16px; padding: 0 18px; }
  .pv { font-size: 1rem; }

  /* Detail grid */
  .dg { grid-template-columns: 1fr 1fr; gap: 11px 16px; }
  .dk { font-size: .66rem; }
  .dv { font-size: .88rem; }

  /* Stone table - scrollable */
  .stbl { font-size: .8rem; }
  .stbl th { font-size: .64rem; }
  .stbl td, .stbl th { padding: 8px 7px; }

  /* Autocomplete list - bigger touch targets */
  .acl li { min-height: 50px; }

  /* Card header */
  .ch { padding: 16px 18px; }
  .ch h2 { font-size: 1.15rem; }

  /* Card body */
  .cb { padding: 16px 18px; }
  .ps { border-radius: 13px; }
}

/* ── iPhone 17 Pro landscape ── */
@media only screen
  and (device-width: 852px)
  and (device-height: 393px)
  and (-webkit-device-pixel-ratio: 3)
  and (orientation: landscape) {
  
  .app {
    grid-template-columns: 280px 1fr;
    padding: 12px max(16px, env(safe-area-inset-right)) 16px max(16px, env(safe-area-inset-left));
    gap: 16px;
  }

  header {
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
  }

  .ci img { max-height: 180px; }
  .ph-val { font-size: 2rem; }
}

/* ── ALL iPhones: prevent font zoom on input focus ── */
@supports (-webkit-touch-callout: none) {
  input[type=text], input[type=number], textarea, select {
    font-size: 16px !important;
  }
  
  /* Smooth scrolling */
  * { -webkit-overflow-scrolling: touch; }
  
  /* Better tap highlight */
  a, button, .acl li {
    -webkit-tap-highlight-color: rgba(27, 92, 75, 0.15);
  }

  /* Remove input shadows on iOS */
  input[type=text], input[type=number] {
    -webkit-appearance: none;
    appearance: none;
  }
}

/* ── High DPI / Retina (3x) — sharper borders ── */
@media (-webkit-min-device-pixel-ratio: 3) {
  .panel, .rc, .ps, .ch {
    border-width: 0.5px;
  }
  input[type=text], input[type=number] {
    border-width: 0.5px;
  }
  input:focus {
    border-width: 1.5px;
  }
}

/* ── ProMotion (smooth scroll on 120Hz) ── */
@media (prefers-reduced-motion: no-preference) {
  html { scroll-behavior: smooth; }
  .rc { animation: fu .25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes fu {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
}

.corner{position:absolute;width:18px;height:18px;border-color:var(--gold-light);border-style:solid}
.corner.tl{top:-1px;left:-1px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.corner.tr{top:-1px;right:-1px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.corner.bl{bottom:-1px;left:-1px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.corner.br{bottom:-1px;right:-1px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
</style>
